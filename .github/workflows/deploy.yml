name: Auto Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Git pull ==="
            git -C /home/safarvps/safar pull origin main
            echo "=== Last commit ==="
            git -C /home/safarvps/safar log --oneline -3
            echo "=== Bun install ==="
            cd /home/safarvps/safar/safar-web/safar-frontend
            ~/.bun/bin/bun install
            echo "=== Bun build ==="
            ~/.bun/bin/bun run build
            echo "=== PM2 restart ==="
            pm2 restart haadiy_travel
            pm2 list
            echo "=== Deploy muvaffaqiyatli! ==="
