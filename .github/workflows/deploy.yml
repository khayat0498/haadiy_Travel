name: Auto Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/safarvps/safar/safar-web/safar-frontend
            git -C /home/safarvps/safar pull origin main
            ~/.bun/bin/bun install
            ~/.bun/bin/bun run build
            systemctl restart haadiy_travel
            echo "Deploy muvaffaqiyatli!"
